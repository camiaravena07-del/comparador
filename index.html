<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comparador — The North Face</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;700;800&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>


  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --black: #0a0a0a; --border: #e0e0e0; --muted: #aaa; --sub: #777; --text: #222; --bg: #fff; --surface: #f7f7f7; }
  body { font-family: "Barlow", sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
  .wrap { max-width: 480px; margin: 0 auto; padding: 24px 16px 56px; }
  .header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1.5px solid var(--black); }
  .eyebrow { font-family: "Barlow Condensed", sans-serif; font-size: 10px; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; color: var(--sub); margin-bottom: 4px; }
  .h1 { font-family: "Barlow Condensed", sans-serif; font-size: 28px; font-weight: 800; letter-spacing: .04em; text-transform: uppercase; line-height: 1; color: var(--black); }
  .tnf-logo { display: flex; flex-direction: column; align-items: flex-end; gap: 1px; opacity: .2; }
  .tnf-logo span { font-family: "Barlow Condensed", sans-serif; font-size: 9px; font-weight: 800; letter-spacing: .15em; text-transform: uppercase; line-height: 1.1; }
  .selector-section { margin-bottom: 24px; }
  .selector-label { font-family: "Barlow Condensed", sans-serif; font-size: 10px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--sub); margin-bottom: 8px; }
  .selector-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .selector-tag { font-family: "Barlow Condensed", sans-serif; font-size: 9px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .selector-tag.active { color: var(--black); }
  .selector-wrap { position: relative; }
  select { width: 100%; appearance: none; -webkit-appearance: none; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 10px 28px 10px 10px; font-family: "Barlow", sans-serif; font-size: 12px; color: var(--black); cursor: pointer; outline: none; transition: border-color .15s; }
  select:focus { border-color: var(--black); }
  .select-arrow { position: absolute; right: 9px; bottom: 11px; pointer-events: none; font-size: 9px; color: var(--sub); }
  .compare-btn { width: 100%; padding: 12px; background: var(--black); color: #fff; border: none; border-radius: 4px; font-family: "Barlow Condensed", sans-serif; font-size: 13px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; cursor: pointer; transition: opacity .15s; }
  .compare-btn:hover { opacity: .85; }
  .compare-btn:disabled { opacity: .3; cursor: not-allowed; }
  .products { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 24px; }
  .pcard { background: var(--surface); border-radius: 4px; overflow: hidden; border: 1px solid var(--border); position: relative; }
  .pcard.active { border: 2px solid var(--black); }
  .pcard img { width: 100%; aspect-ratio: 3/4; object-fit: cover; display: block; }
  .pcard-overlay { position: absolute; top: 0; left: 0; right: 0; padding: 10px; }
  .pcard-tag { font-family: "Barlow Condensed", sans-serif; font-size: 9px; font-weight: 700; letter-spacing: .16em; text-transform: uppercase; padding: 3px 8px; display: inline-block; }
  .pcard.active .pcard-tag { background: var(--black); color: #fff; }
  .pcard:not(.active) .pcard-tag { background: rgba(255,255,255,.75); color: var(--text); }
  .pcard-body { padding: 12px; border-top: 1px solid var(--border); }
  .pcard-name { font-family: "Barlow Condensed", sans-serif; font-size: 13px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: var(--black); line-height: 1.2; margin-bottom: 5px; }
  .pcard-price { font-size: 16px; font-weight: 500; color: var(--black); }
  .pcard-installment { font-size: 10px; color: var(--muted); margin-top: 1px; }
  .sale-price { color: #c00; }
  .original-price { text-decoration: line-through; color: var(--muted); font-size: 12px; }
  .stock-ok { color: #2a7a2a; font-size: 10px; font-weight: 500; }
  .stock-low { color: #b85c00; font-size: 10px; font-weight: 500; }
  .color-tag { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .table-section-title { font-family: "Barlow Condensed", sans-serif; font-size: 10px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .table-wrap { border-radius: 4px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 24px; }
  .table-head { display: grid; grid-template-columns: 40% 30% 30%; padding: 10px 0; background: var(--black); }
  .th { font-family: "Barlow Condensed", sans-serif; font-size: 10px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; padding: 0 14px; color: rgba(255,255,255,.4); }
  .th.ca { color: rgba(255,255,255,.9); }
  .th.cb { color: rgba(255,255,255,.6); }
  .trow { display: grid; grid-template-columns: 40% 30% 30%; border-bottom: 1px solid var(--border); background: #fff; }
  .trow:last-child { border-bottom: none; }
  .trow:hover { background: var(--surface); }
  .tlabel { padding: 13px 14px; font-family: "Barlow Condensed", sans-serif; font-size: 11px; font-weight: 500; letter-spacing: .08em; text-transform: uppercase; color: var(--sub); display: flex; align-items: center; border-right: 1px solid var(--border); background: var(--surface); }
  .tval { padding: 13px 12px; font-size: 12px; color: var(--sub); display: flex; flex-direction: column; justify-content: center; gap: 4px; line-height: 1.35; border-right: 1px solid var(--border); }
  .tval:last-child { border-right: none; }
  .tval.winner { color: var(--black); font-weight: 500; }
  .tag { font-family: "Barlow Condensed", sans-serif; font-size: 9px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; display: inline-block; padding: 2px 6px; border-radius: 2px; width: fit-content; }
  .tval.winner .tag { background: var(--black); color: #fff; }
  .tval:not(.winner) .tag { background: #eee; color: #888; }
  .level { display: flex; gap: 3px; align-items: center; margin-bottom: 2px; }
  .lvl-bar { height: 3px; width: 16px; border-radius: 1px; background: #ddd; }
  .tval:not(.winner) .lvl-bar.on { background: var(--black); }
  .tval.winner .lvl-bar.on { background: var(--black); }
  .ico-yes { color: #2a7a2a; font-size: 13px; }
  .ico-no  { color: var(--muted); font-size: 13px; }
  .verdict { border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
  .verdict-top { background: var(--black); padding: 14px; }
  .verdict-eyebrow { font-family: "Barlow Condensed", sans-serif; font-size: 10px; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; color: rgba(255,255,255,.45); margin-bottom: 2px; }
  .verdict-title { font-family: "Barlow Condensed", sans-serif; font-size: 20px; font-weight: 800; letter-spacing: .05em; text-transform: uppercase; color: #fff; }
  .verdict-grid { display: grid; grid-template-columns: 1fr 1fr; background: #fff; }
  .vcard { padding: 14px; border-right: 1px solid var(--border); }
  .vcard:last-child { border-right: none; }
  .vcard-name { font-family: "Barlow Condensed", sans-serif; font-size: 12px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--black); margin-bottom: 5px; }
  .vcard-use { font-size: 12px; color: var(--sub); line-height: 1.5; margin-bottom: 8px; }
  .vtags { display: flex; flex-wrap: wrap; gap: 4px; }
  .vtag { font-family: "Barlow Condensed", sans-serif; font-size: 9px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; padding: 3px 6px; border-radius: 2px; border: 1px solid #ddd; color: var(--sub); }
  .vtag.hi { background: var(--black); border-color: var(--black); color: #fff; }

  /* Loading state tabla */
  .trow.loading .tval { color: var(--muted); font-style: italic; font-size: 11px; }
  .skeleton { display: inline-block; background: linear-gradient(90deg, #eee 25%, #f5f5f5 50%, #eee 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; border-radius: 3px; height: 12px; }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }


  .level{display:flex;gap:3px;align-items:center;margin-bottom:2px}
  .lvl-bar{height:3px;width:16px;border-radius:1px;background:#ddd}
  .tval .lvl-bar.on{background:var(--black)}
</style>
</head>

var RATINGS={};

async function fetchRating(sku_id){
  var base=sku_id.split('_')[0];
  if(RATINGS[base]!==undefined)return RATINGS[base];
  var TOKEN='euiBoGzgKtJ2pKT4O5JaXhEz5h8eNjbAOGRkMs3PQlzv2tErL5gmh5HXzSPl';
  var url='https://api3.verificado.ai/reviews/'+TOKEN+'/product/'+sku_id+'/filter/0/sort/mps/page/1';
  try{
    var res=await fetch(url);
    var json=await res.json();
    var avg=json&&json.data&&json.data.average_rating;
    var tot=json&&json.data&&json.data.total_reviews;
    var r=(avg&&tot)?{score:parseFloat(avg),count:parseInt(tot)}:null;
    RATINGS[base]=r; return r;
  }catch(e){RATINGS[base]=null;return null;}
}

    {label:'Cobertura',always:false,winnerTag:'+Cobertura',

function fp(n){return'$'+Math.round(n).toLocaleString('es-CL');}
function pp(p){return{id:p.i,title:p.t,description:p.d,espTecnicas:p.e,image:p.img,link:p.l,price:parseFloat(p.p)||0,sale:p.sp?parseFloat(p.sp):null,color:p.c,genero:p.g,qty:parseInt(p.q)||0,availability:p.a,pmax:p.pm,pmax2:p.pm2};}
function rrv(val){if(!val)return'<span style="color:var(--muted);font-size:11px;font-style:italic">Sin opiniones</span>';var s='\u2605'.repeat(Math.round(val.score))+'\u2606'.repeat(5-Math.round(val.score));return s+' '+val.score.toFixed(1)+' <span class="tag">'+val.count+' opiniones</span>';}
function urc(id,val){var el=document.getElementById(id);if(el)el.innerHTML=rrv(val);}

function populateSelects(){
  var s1=document.getElementById('sel1'),s2=document.getElementById('sel2'),groups={};
  CATALOG.forEach(function(p){var c=p.pm2||'Otros';if(!groups[c])groups[c]=[];groups[c].push(p);});
  [s1,s2].forEach(function(sel){
    Object.keys(groups).sort().forEach(function(cat){
      var og=document.createElement('optgroup');og.label=cat;
      groups[cat].forEach(function(p){var opt=document.createElement('option');opt.value=p.i;opt.textContent=sn(p.t)+' \u2014 '+p.c;og.appendChild(opt);});
      sel.appendChild(og);});});
  s1.value='NF0A8BKC_NFJK3';s2.value='NF0A8BKD_NFJK3';onSelect();
}

function onSelect(){
  var v1=document.getElementById('sel1').value,v2=document.getElementById('sel2').value;
  document.getElementById('tag1').classList.toggle('active',!!v1);
  document.getElementById('tag2').classList.toggle('active',!!v2);
  var ok=v1&&v2&&v1!==v2;document.getElementById('cmp-btn').disabled=!ok;
  if(ok)runCompare();
}

function runCompare(){
  var v1=document.getElementById('sel1').value,v2=document.getElementById('sel2').value;
  if(!v1||!v2||v1===v2)return;
  var r1=CATALOG.find(function(x){return x.i===v1;}),r2=CATALOG.find(function(x){return x.i===v2;});
  if(!r1||!r2)return;render(pp(r1),pp(r2));
}

  function pb(p){if(p.sale)return'<div class="pcard-price sale-price">'+fp(p.sale)+'</div><div class="original-price">'+fp(p.price)+'</div>';return'<div class="pcard-price">'+fp(p.price)+'</div><div class="pcard-installment">6 x '+fp(p.price/6)+' sin inter\u00e9s</div>';}
  function sb(p){if(p.availability!=='In Stock')return'<span class="stock-low">Sin stock</span>';if(p.qty<10)return'<span class="stock-low">\u00daltimas unidades</span>';return'<span class="stock-ok">En stock</span>';}
  function ut(p){var t=p.description.toLowerCase(),tags=[];if(t.indexOf('trekking')>=0||t.indexOf('sendero')>=0)tags.push('Trekking');if(t.indexOf('ciudad')>=0||t.indexOf('acera')>=0)tags.push('Ciudad');if(t.indexOf('empac')>=0||t.indexOf('guardar')>=0)tags.push('Viajes');if(t.indexOf('parka')>=0||t.indexOf('muslo')>=0)tags.push('Lluvia intensa');if(t.indexOf('plum')>=0||t.indexOf('down')>=0)tags.push('Fr\u00edo extremo');return tags.filter(function(v,i,a){return a.indexOf(v)===i;}).slice(0,3);}
  var w1=attrs.filter(function(a){return a.w==='a';}).length,w2=attrs.filter(function(a){return a.w==='b';}).length;
  var rows=attrs.map(function(item){
    var rule=item.rule,va=item.va,vb=item.vb,wA=item.w==='a',wB=item.w==='b';
    var tA=wA&&rule.winnerTag?' <span class="tag">'+rule.winnerTag+'</span>':'';
    var tB=wB&&rule.winnerTag?' <span class="tag">'+rule.winnerTag+'</span>':'';
    return'<div class="trow"><div class="tlabel">'+rule.label+'</div><div class="tval'+(wA?' winner':'')+'">'+rule.render(va,wA)+tA+'</div><div class="tval'+(wB?' winner':'')+'">'+rule.render(vb,wB)+tB+'</div></div>';
  }).join('');
  rows+='<div class="trow"><div class="tlabel">Valoraci\u00f3n</div><div class="tval" id="rating-a"><span style="color:var(--muted);font-size:11px">...</span></div><div class="tval" id="rating-b"><span style="color:var(--muted);font-size:11px">...</span></div></div>';
  var t1=ut(p1),t2=ut(p2);if(w1>w2)t1.push('Mejor spec');if(w2>w1)t2.push('Mejor spec');
  var vtags=function(ts){return ts.map(function(t){return'<span class="vtag hi">'+t+'</span>';}).join('');};
  document.getElementById('output').innerHTML=
    '<div class="products">'+
    '<div class="pcard active"><img src="'+p1.image+'" alt="" onerror="this.src=\''+ph+'\'"><div class="pcard-overlay"><span class="pcard-tag">A</span></div><div class="pcard-body"><div class="pcard-name">'+n1+'</div>'+pb(p1)+'<div class="color-tag">'+p1.color+'</div>'+sb(p1)+'</div></div>'+
    '<div class="pcard"><img src="'+p2.image+'" alt="" onerror="this.src=\''+ph+'\'"><div class="pcard-overlay"><span class="pcard-tag">B</span></div><div class="pcard-body"><div class="pcard-name">'+n2+'</div>'+pb(p2)+'<div class="color-tag">'+p2.color+'</div>'+sb(p2)+'</div></div>'+
    '</div>'+
    '<div class="table-section-title">Especificaciones</div>'+
    '<div class="table-wrap"><div class="table-head"><div class="th">Atributo</div><div class="th ca">A \u2014 '+n1.split(' ')[0]+'</div><div class="th cb">B \u2014 '+n2.split(' ')[0]+'</div></div>'+rows+'</div>'+
    '<div class="verdict"><div class="verdict-top"><div class="verdict-eyebrow">Veredicto</div><div class="verdict-title">\u00bfCu\u00e1l es tu terreno?</div></div>'+
    '<div class="verdict-grid">'+
    '<div class="vcard"><div class="vcard-name">A \u2014 '+n1.split(' ')[0]+'</div><div class="vcard-use">'+p1.description.split('.')[0].trim()+'.</div><div class="vtags">'+vtags(t1)+'</div></div>'+
    '<div class="vcard"><div class="vcard-name">B \u2014 '+n2.split(' ')[0]+'</div><div class="vcard-use">'+p2.description.split('.')[0].trim()+'.</div><div class="vtags">'+vtags(t2)+'</div></div>'+
    '</div></div>';
  fetchRating(p1.id).then(function(r){urc('rating-a',r);});
  fetchRating(p2.id).then(function(r){urc('rating-b',r);});
}

populateSelects();

</script>

</html>

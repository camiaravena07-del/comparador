<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comparador de Tamaño — Kipling Seoul</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  background: #f0efeb;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  min-height: 100vh;
  padding: 2rem;
}
.comparator {
  background: #fff;
  border-radius: 4px;
  padding: 1.5rem 1.5rem 2rem;
  max-width: 700px;
  width: 100%;
}
.section-label {
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #999;
  margin-bottom: 10px;
  font-weight: 500;
}
.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 18px;
}
.chip {
  padding: 6px 14px;
  border-radius: 2px;
  border: 1px solid #d0cfc9;
  background: #fff;
  color: #444;
  font-size: 12px;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.12s;
  letter-spacing: 0.02em;
}
.chip:hover { background: #f5f4f0; }
.chip.on { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
.stage {
  position: relative;
  background: #f0efeb;
  border-radius: 2px;
  min-height: 460px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.bag-wrap {
  position: relative;
  flex-shrink: 0;
  margin-left: 36px;
  margin-bottom: 32px;
}
.bag-img {
  display: block;
  width: 240px;
  height: auto;
  user-select: none;
  pointer-events: none;
  -webkit-user-drag: none;
}
.dim-v {
  position: absolute;
  left: -28px; top: 0; height: 100%;
  display: flex; flex-direction: column; align-items: center;
  pointer-events: none;
}
.dim-h {
  position: absolute;
  bottom: -26px; left: 0; width: 100%;
  display: flex; flex-direction: row; align-items: center;
  pointer-events: none;
}
.dbar { background: #bbb; flex: 1; }
.dim-v .dbar { width: 1px; }
.dim-h .dbar { height: 1px; }
.tick-v { width: 7px; height: 1px; background: #bbb; }
.tick-h { height: 7px; width: 1px; background: #bbb; }
.dlabel { font-size: 10px; color: #aaa; white-space: nowrap; padding: 2px 5px; letter-spacing: 0.04em; }
.draggable {
  position: absolute;
  cursor: grab;
  touch-action: none;
  z-index: 5;
}
.draggable:active { cursor: grabbing; }
.draggable svg { display: block; overflow: visible; }
.obj-badge {
  position: absolute;
  bottom: calc(100% + 5px);
  left: 50%; transform: translateX(-50%);
  background: rgba(10,10,10,0.72);
  color: #fff;
  font-size: 9px;
  letter-spacing: 0.05em;
  border-radius: 2px;
  padding: 2px 8px;
  pointer-events: none;
  white-space: nowrap;
  opacity: 0;
  transition: opacity 0.15s;
}
.draggable:hover .obj-badge,
.draggable.dragging .obj-badge { opacity: 1; }
.obj-name {
  position: absolute;
  top: calc(100% + 5px);
  left: 50%; transform: translateX(-50%);
  font-size: 10px; color: #999;
  white-space: nowrap; pointer-events: none;
  letter-spacing: 0.03em;
}
.hint {
  font-size: 11px; color: #bbb; text-align: center;
  margin-top: 1.8rem; letter-spacing: 0.04em;
}
</style>
</head>

<script>
const BAG_REAL = { w: 35, h: 44 };

const ITEMS = [
  {
    id: 'bottle', label: 'Botella 500ml', w: 5.08, h: 25.4,
    draw(pw, ph) {
      const nw = pw * 0.44, nx = (pw - nw) / 2;
      return `
        <rect x="${nx + nw*0.08}" y="-5" width="${nw*0.84}" height="6" rx="1.5" fill="#777"/>
        <rect x="${nx}" y="0" width="${nw}" height="${ph*0.13}" rx="2" fill="#aaa" stroke="#777" stroke-width="0.8"/>
        <rect x="0" y="${ph*0.13}" width="${pw}" height="${ph*0.87}" rx="${pw*0.13}" fill="#2a2a2a" stroke="#111" stroke-width="0.8"/>
        <ellipse cx="${pw/2}" cy="${ph*0.27}" rx="${pw*0.28}" ry="${ph*0.03}" fill="#fff" opacity="0.08"/>
      `;
    }
  },
  {
    id: 'magazine', label: 'Revista A4', w: 23.2, h: 29.7,
    draw(pw, ph) {
      return `
        <rect x="0" y="0" width="${pw}" height="${ph}" rx="1" fill="#e8ddd4" stroke="#c5b5a5" stroke-width="0.8"/>
        <rect x="${pw*0.06}" y="${ph*0.04}" width="${pw*0.88}" height="${ph*0.26}" rx="1" fill="#c9b4a0" opacity="0.65"/>
        <text x="${pw*0.08}" y="${ph*0.175}" font-size="${Math.max(pw*0.11,7)}" fill="#5a3820" font-family="Georgia,serif" font-style="italic" opacity="0.9">FASHION</text>
        <rect x="${pw*0.06}" y="${ph*0.34}" width="${pw*0.88}" height="${ph*0.13}" rx="1" fill="#b5a090" opacity="0.2"/>
        <line x1="${pw*0.06}" y1="${ph*0.55}" x2="${pw*0.94}" y2="${ph*0.55}" stroke="#a09080" stroke-width="0.5" opacity="0.35"/>
        <line x1="${pw*0.06}" y1="${ph*0.64}" x2="${pw*0.80}" y2="${ph*0.64}" stroke="#a09080" stroke-width="0.5" opacity="0.35"/>
        <line x1="${pw*0.06}" y1="${ph*0.73}" x2="${pw*0.72}" y2="${ph*0.73}" stroke="#a09080" stroke-width="0.5" opacity="0.3"/>
      `;
    }
  },
  {
    id: 'laptop', label: 'Laptop 13"', w: 21.24, h: 30.41,
    draw(pw, ph) {
      const lh = ph * 0.71, bh = ph * 0.14;
      return `
        <rect x="0" y="0" width="${pw}" height="${lh}" rx="3" fill="#d4d4d4" stroke="#b8b8b8" stroke-width="0.8"/>
        <rect x="${pw*0.04}" y="${ph*0.04}" width="${pw*0.92}" height="${lh*0.9}" rx="2" fill="#1c2340" opacity="0.88"/>
        <path d="M${-pw*0.05},${lh} L${pw*1.05},${lh} L${pw*0.97},${lh+bh} L${pw*0.03},${lh+bh} Z" fill="#c8c8c8" stroke="#b5b5b5" stroke-width="0.8"/>
        <rect x="${pw*0.36}" y="${lh+bh*0.22}" width="${pw*0.28}" height="${bh*0.45}" rx="1" fill="#afafaf"/>
      `;
    }
  },
  {
    id: 'phone', label: 'Smartphone', w: 7.5, h: 16,
    draw(pw, ph) {
      return `
        <rect x="0" y="0" width="${pw}" height="${ph}" rx="${pw*0.14}" fill="#1a1a1a" stroke="#3a3a3a" stroke-width="0.8"/>
        <rect x="${pw*0.07}" y="${ph*0.06}" width="${pw*0.86}" height="${ph*0.78}" rx="2" fill="#1e2d50" opacity="0.9"/>
        <circle cx="${pw/2}" cy="${ph*0.92}" r="${pw*0.1}" fill="#2a2a2a" stroke="#444" stroke-width="0.5"/>
        <rect x="${pw*0.3}" y="${ph*0.025}" width="${pw*0.4}" height="2.5" rx="1.5" fill="#2a2a2a"/>
      `;
    }
  },
  {
    id: 'passport', label: 'Pasaporte', w: 12.5, h: 17.5,
    draw(pw, ph) {
      return `
        <rect x="0" y="0" width="${pw}" height="${ph}" rx="3" fill="#1a3a26" stroke="#0f2518" stroke-width="0.8"/>
        <text x="${pw/2}" y="${ph*0.19}" font-size="${Math.max(pw*0.085,5.5)}" fill="#c8b46a" font-family="Georgia,serif" text-anchor="middle" letter-spacing="0.5">PASAPORTE</text>
        <text x="${pw/2}" y="${ph*0.29}" font-size="${Math.max(pw*0.065,4.5)}" fill="#a89050" font-family="Georgia,serif" text-anchor="middle" opacity="0.8">CHILE</text>
        <circle cx="${pw/2}" cy="${ph*0.57}" r="${pw*0.25}" fill="none" stroke="#c8b46a" stroke-width="0.7" opacity="0.5"/>
        <circle cx="${pw/2}" cy="${ph*0.57}" r="${pw*0.14}" fill="none" stroke="#c8b46a" stroke-width="0.5" opacity="0.35"/>
        <line x1="${pw*0.12}" y1="${ph*0.82}" x2="${pw*0.88}" y2="${ph*0.82}" stroke="#c8b46a" stroke-width="0.5" opacity="0.4"/>
        <line x1="${pw*0.12}" y1="${ph*0.9}"  x2="${pw*0.66}" y2="${ph*0.9}"  stroke="#c8b46a" stroke-width="0.5" opacity="0.4"/>
      `;
    }
  },
  {
    id: 'wallet', label: 'Billetera', w: 11, h: 9,
    draw(pw, ph) {
      return `
        <rect x="0" y="0" width="${pw}" height="${ph}" rx="3" fill="#5a3820" stroke="#3d2410" stroke-width="0.8"/>
        <line x1="0" y1="${ph*0.5}" x2="${pw}" y2="${ph*0.5}" stroke="#3d2410" stroke-width="0.6" opacity="0.4"/>
        <rect x="${pw*0.55}" y="${ph*0.12}" width="${pw*0.36}" height="${ph*0.76}" rx="2.5" fill="#6e4428" stroke="#3d2410" stroke-width="0.6"/>
        <circle cx="${pw*0.73}" cy="${ph*0.5}" r="${pw*0.065}" fill="#3d2410" opacity="0.5"/>
      `;
    }
  },
  {
    id: 'book', label: 'Libro', w: 15, h: 21,
    draw(pw, ph) {
      return `
        <rect x="0" y="0" width="${pw}" height="${ph}" rx="2" fill="#8b1818" stroke="#5a0e0e" stroke-width="0.8"/>
        <rect x="0" y="0" width="${pw*0.09}" height="${ph}" rx="1" fill="#5a0e0e" opacity="0.7"/>
        <rect x="${pw*0.14}" y="${ph*0.07}" width="${pw*0.72}" height="${ph*0.07}" rx="1" fill="#fff" opacity="0.1"/>
        <line x1="${pw*0.14}" y1="${ph*0.22}" x2="${pw*0.86}" y2="${ph*0.22}" stroke="#fff" stroke-width="0.5" opacity="0.14"/>
        <line x1="${pw*0.14}" y1="${ph*0.32}" x2="${pw*0.86}" y2="${ph*0.32}" stroke="#fff" stroke-width="0.5" opacity="0.11"/>
      `;
    }
  },
];

let activeItems = new Set(['bottle', 'magazine', 'laptop']);

function getScale() {
  const img = document.getElementById('bag-img');
  return img.offsetWidth / BAG_REAL.w;
}

function spawnItem(item) {
  const stage = document.getElementById('stage');
  if (document.getElementById('drag-' + item.id)) return;
  const s = getScale();
  const pw = item.w * s, ph = item.h * s;
  const sRect = stage.getBoundingClientRect();
  const bRect = document.getElementById('bag-wrap').getBoundingClientRect();
  const cx = bRect.left - sRect.left + bRect.width/2  - pw/2 + (Math.random()-0.5)*90;
  const cy = bRect.top  - sRect.top  + bRect.height/2 - ph/2 + (Math.random()-0.5)*60;
  const el = document.createElement('div');
  el.className = 'draggable';
  el.id = 'drag-' + item.id;
  el.style.cssText = `left:${cx}px;top:${cy}px;width:${pw}px;height:${ph}px;`;
  const wl = item.w % 1 === 0 ? item.w : item.w.toFixed(1);
  const hl = item.h % 1 === 0 ? item.h : item.h.toFixed(1);
  el.innerHTML = `
    <svg width="${pw}" height="${ph}" viewBox="0 0 ${pw} ${ph}" overflow="visible">${item.draw(pw, ph)}</svg>
    <div class="obj-badge">${wl} × ${hl} cm</div>
    <div class="obj-name">${item.label}</div>
  `;
  stage.appendChild(el);
  makeDraggable(el, stage);
}

function removeItem(id) {
  const el = document.getElementById('drag-' + id);
  if (el) el.remove();
}

function makeDraggable(el, container) {
  let ox=0,oy=0,sx=0,sy=0,dragging=false;
  const start = (cx,cy) => {
    dragging=true; sx=cx; sy=cy;
    ox=parseFloat(el.style.left); oy=parseFloat(el.style.top);
    el.style.zIndex=20; el.classList.add('dragging');
  };
  const move = (cx,cy) => {
    if(!dragging) return;
    const r=container.getBoundingClientRect();
    let nx=ox+(cx-sx), ny=oy+(cy-sy);
    nx=Math.max(-el.offsetWidth*0.4, Math.min(r.width-el.offsetWidth*0.6, nx));
    ny=Math.max(-el.offsetHeight*0.4, Math.min(r.height-el.offsetHeight*0.6, ny));
    el.style.left=nx+'px'; el.style.top=ny+'px';
  };
  const end = () => { dragging=false; el.style.zIndex=5; el.classList.remove('dragging'); };
  el.addEventListener('mousedown', e=>{ e.preventDefault(); start(e.clientX,e.clientY); });
  document.addEventListener('mousemove', e=>move(e.clientX,e.clientY));
  document.addEventListener('mouseup', end);
  el.addEventListener('touchstart', e=>{ e.preventDefault(); start(e.touches[0].clientX,e.touches[0].clientY); }, {passive:false});
  document.addEventListener('touchmove', e=>{ if(dragging){ e.preventDefault(); move(e.touches[0].clientX,e.touches[0].clientY); } }, {passive:false});
  document.addEventListener('touchend', end);
}

function buildChips() {
  const c = document.getElementById('chips');
  c.innerHTML = ITEMS.map(o =>
    `<button class="chip${activeItems.has(o.id) ? ' on' : ''}" data-id="${o.id}">${o.label}</button>`
  ).join('');
  c.querySelectorAll('.chip').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.id;
      if (activeItems.has(id)) { activeItems.delete(id); removeItem(id); }
      else { activeItems.add(id); spawnItem(ITEMS.find(i=>i.id===id)); }
      buildChips();
    });
  });
}

buildChips();
const img = document.getElementById('bag-img');
const init = () => ITEMS.filter(i=>activeItems.has(i.id)).forEach(spawnItem);
if (img.complete && img.naturalWidth) { setTimeout(init, 50); }
else { img.addEventListener('load', () => setTimeout(init, 50)); }
</script>
